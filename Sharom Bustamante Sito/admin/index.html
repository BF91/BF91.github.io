<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="vewport" content="width==divace-width, initial-scale=1.0" />
        <title>Admin - Shannon J. Hermes</title>
        <meta name="robots" content="noindex, nofollow" />
        <style>
            *, *::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: system-ui, sans-serif;
                background: #f5f5f3;
                color: #1a1a1a;
                min-height: 100vh;
            }

            /* LOGIN */
            #login-screen {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 1rem;
            }
            .login-card {
                background: #fff;
                border: 0.5px solid #ddd;
                border-radius: 12px;
                padding: 2rem;
                width: min(360px, 100%);
            }
            .login-card h1 {
                font-size: 18px;
                font-weight: 500;
                margin-bottom: 4px;
            }
            .login-card p {
                font-size: 13px;
                color: #888;
                margin-bottom: 1.5rem;
            }
            .login-card label {
                font-size: 13px;
                color: #666;
                display: block;
                margin-bottom: 6px;
            }
            .login-card input {
                width: 100%;
                padding: 9px 12px;
                border: 0.5px solid #ccc;
                border-radius: 8px;
                font-size: 14px;
                margin-bottom: 1rem;
            }
            .login-card button {
                width: 100%;
                padding: 10px;
                border-radius: 8px;
                background: #1a1a1a;
                color: #fff;
                border: none;
                font-size: 14px;
                cursor: pointer;
            }
            .login-card button:hover {
                opacity: 0.85;
            }
            .error-msg {
                font-size: 13px;
                color: #a32d2d;
                margin-top: 8px;
                display: none;
            }

            /* ADMIN */
            #admin-screen {
                display: none;
            } 
            header {
                background: #fff;
                border-bottom: 0.5px solid #e0e0e0;
                padding: 1rem 2rem;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            header h1 {
                font-size: 16px;
                font-weight: 500;
            }
            header button {
                padding: 6px 14px;
                border-radius: 8px;
                border: 0.5px solid #ccc;
                background: transparent;
                font-size: 13px;
                cursor: pointer;
            }
            header button:hover {
                background: #f0f0f0;
            }
            main {
                max-width: 900px;
                margin: 0 auto;
                padding: 2rem 1.5rem;
            }
            .tabs {
                display: flex;
                gap: 8px;
                margin-bottom: 1.5rem;
            }
            /* RIPRENDO DA TAB {} */
            .tab {
                padding: 8px 10px;
                border-radius: 8px;
                border: 0.5px solid #ccc;
                background: transparent;
                font-size: 14px;
                color: #666;
                cursor: pointer;
            }
            .tab.active {
                background: #f0f0f0;
                color: #1a1a1a;
                font-weight: 500;
                border-radius: 12px;
                color: #aaa;
            }
            .panel {
                display: none;
            }
            .panel.active {
                display: block;
            }
            .card {
                background: #fff;
                border: 0.5px solid #e0e0e0;
                border-radius: 12px;
                padding: 1.25rem;
            }
            label {
                font-size: 13px;
                color: #666;
                display: block;
                margin-bottom: 6px;
            }
            .optional {
                font-size: 11px;
                color: #aaa;
            }
            input[type=text], textarea { 
                width: 100%;
                padding: 8px 12px;
                border: 0.5px solid #ccc;
                border-radius: 8px;
                font-size: 14px;
                color: #1a1a1a;
                background: #fff;
                margin-bottom: 1rem;
            }
            textarea {
                resize: vertical;
                min-height: 80px;
            }
            .drop-zone {
                border: 1.5px dashed #ccc;
                border-radius: 12px;
                padding: 2rem;
                text-align: center;
                cursor: pointer;
                position: relative;
                margin-bottom: 1rem;
                transition: all 0.15s;
            }
            .drop-zone:hover {
                border-color: #999;
                background: #fafafa;
            }
            .drop-zone.has-img {
                border-style: solid;
                border-color: #378add;
            }
            .drop-zone input[type=file] {
                position: absolute;
                inset: 0;
                opacity: 0;
                cursor: pointer;
                width: 100%;
                height: 100%;
            }
            #preview {
                width: 100%;
                max-height: 220px;
                object-fit: contain;
                border-radius: 8px;
                display: none;
            }
            .drop-label {
                font-size: 14px;
                color: #888;
                pointer-events: none;
            }
            .drop-hint {
                font-size: 12px;
                color: #bbb;
                margin-top: 4px;
                pointer-events: none;
            }
            .btn-row {
                display: flex;
                gap: 8px;
                justify-content: flex-end;
                margin-top: 0.5rem;
            }
            .button.secondary {
                padding: 8px 18px;
                border-color: 8px;
                border: 0.5px solid #ccc;
                background: transparent;
                font-size: 14px;
                cursor: pointer;
            }
            button.secondary:hover {
                background: #f0f0f0;
            }
            button.primary {
                padding: 8px 18px;
                border-radius: 8px;
                border: none;
                background: #1a1a1a;
                color: #fff;
                font-size: 14px;
                cursor: pointer;
            }
            button.primary:hover {
                opacity: 0.85;
            }
            button.danger {
                padding: 5px 10px;
                border-radius: 8px;
                border: 0.5px solid #f09595;
                background: transparent;
                color: #a32d2d;
                font-size: 12px;
                cursor: pointer;
            }
            button.danger:hover {
                background: #fcebeb;
            }
            button.edit-btn {
                padding: 5px 10px;
                border-radius: 8px;
                border: 0.5px solid #ccc;
                background: transparent;
                font-size: 12px;
                cursor: pointer;
            }
            button.edit-btn:hover {
                background: #f0f0f0;
            }
            .badge {
                display: inline-block;
                font-size: 11px;
                padding: 2px 8px;
                border-radius: 8px;
                background: #f0f0f0;
                color: #666;
                margin-left: 6px;
            }
            .gallery {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 12px;
            }
            .art-card {
                
            }

              
        </style>
    </head>
</html>
