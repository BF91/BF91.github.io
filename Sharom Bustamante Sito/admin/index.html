<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="vewport" content="width==divace-width, initial-scale=1.0" />
        <title>Admin - Shannon J. Hermes</title>
        <meta name="robots" content="noindex, nofollow" />
        <style>
            *, *::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: system-ui, sans-serif;
                background: #f5f5f3;
                color: #1a1a1a;
                min-height: 100vh;
            }

            /* LOGIN */
            #login-screen {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 1rem;
            }
            .login-card {
                background: #fff;
                border: 0.5px solid #ddd;
                border-radius: 12px;
                padding: 2rem;
                width: min(360px, 100%);
            }
            .login-card h1 {
                font-size: 18px;
                font-weight: 500;
                margin-bottom: 4px;
            }
            .login-card p {
                font-size: 13px;
                color: #888;
                margin-bottom: 1.5rem;
            }
            .login-card label {
                font-size: 13px;
                color: #666;
                display: block;
                margin-bottom: 6px;
            }
            .login-card input {
                width: 100%;
                padding: 9px 12px;
                border: 0.5px solid #ccc;
                border-radius: 8px;
                font-size: 14px;
                margin-bottom: 1rem;
            }
            .login-card button {
                width: 100%;
                padding: 10px;
                border-radius: 8px;
                background: #1a1a1a;
                color: #fff;
                border: none;
                font-size: 14px;
                cursor: pointer;
            }
            .login-card button:hover {
                opacity: 0.85;
            }
            .error-msg {
                font-size: 13px;
                color: #a32d2d;
                margin-top: 8px;
                display: none;
            }

            /* ADMIN */
            #admin-screen {
                display: none;
            } 
            header {
                background: #fff;
                border-bottom: 0.5px solid #e0e0e0;
                padding: 1rem 2rem;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            header h1 {
                font-size: 16px;
                font-weight: 500;
            }
            header button {
                padding: 6px 14px;
                border-radius: 8px;
                border: 0.5px solid #ccc;
                background: transparent;
                font-size: 13px;
                cursor: pointer;
            }
            header button:hover {
                background: #f0f0f0;
            }
            main {
                max-width: 900px;
                margin: 0 auto;
                padding: 2rem 1.5rem;
            }
            .tabs {
                display: flex;
                gap: 8px;
                margin-bottom: 1.5rem;
            }
            
            .tab {
                padding: 8px 10px;
                border-radius: 8px;
                border: 0.5px solid #ccc;
                background: transparent;
                font-size: 14px;
                color: #666;
                cursor: pointer;
            }
            .tab.active {
                background: #f0f0f0;
                color: #1a1a1a;
                font-weight: 500;
                border-radius: 12px;
                color: #aaa;
            }
            .panel {
                display: none;
            }
            .panel.active {
                display: block;
            }
            .card {
                background: #fff;
                border: 0.5px solid #e0e0e0;
                border-radius: 12px;
                padding: 1.25rem;
            }
            label {
                font-size: 13px;
                color: #666;
                display: block;
                margin-bottom: 6px;
            }
            .optional {
                font-size: 11px;
                color: #aaa;
            }
            input[type=text], textarea { 
                width: 100%;
                padding: 8px 12px;
                border: 0.5px solid #ccc;
                border-radius: 8px;
                font-size: 14px;
                color: #1a1a1a;
                background: #fff;
                margin-bottom: 1rem;
            }
            textarea {
                resize: vertical;
                min-height: 80px;
            }
            .drop-zone {
                border: 1.5px dashed #ccc;
                border-radius: 12px;
                padding: 2rem;
                text-align: center;
                cursor: pointer;
                position: relative;
                margin-bottom: 1rem;
                transition: all 0.15s;
            }
            .drop-zone:hover {
                border-color: #999;
                background: #fafafa;
            }
            .drop-zone.has-img {
                border-style: solid;
                border-color: #378add;
            }
            .drop-zone input[type=file] {
                position: absolute;
                inset: 0;
                opacity: 0;
                cursor: pointer;
                width: 100%;
                height: 100%;
            }
            #preview {
                width: 100%;
                max-height: 220px;
                object-fit: contain;
                border-radius: 8px;
                display: none;
            }
            .drop-label {
                font-size: 14px;
                color: #888;
                pointer-events: none;
            }
            .drop-hint {
                font-size: 12px;
                color: #bbb;
                margin-top: 4px;
                pointer-events: none;
            }
            .btn-row {
                display: flex;
                gap: 8px;
                justify-content: flex-end;
                margin-top: 0.5rem;
            }
            .button.secondary {
                padding: 8px 18px;
                border-color: 8px;
                border: 0.5px solid #ccc;
                background: transparent;
                font-size: 14px;
                cursor: pointer;
            }
            button.secondary:hover {
                background: #f0f0f0;
            }
            button.primary {
                padding: 8px 18px;
                border-radius: 8px;
                border: none;
                background: #1a1a1a;
                color: #fff;
                font-size: 14px;
                cursor: pointer;
            }
            button.primary:hover {
                opacity: 0.85;
            }
            button.danger {
                padding: 5px 10px;
                border-radius: 8px;
                border: 0.5px solid #f09595;
                background: transparent;
                color: #a32d2d;
                font-size: 12px;
                cursor: pointer;
            }
            button.danger:hover {
                background: #fcebeb;
            }
            button.edit-btn {
                padding: 5px 10px;
                border-radius: 8px;
                border: 0.5px solid #ccc;
                background: transparent;
                font-size: 12px;
                cursor: pointer;
            }
            button.edit-btn:hover {
                background: #f0f0f0;
            }
            .badge {
                display: inline-block;
                font-size: 11px;
                padding: 2px 8px;
                border-radius: 8px;
                background: #f0f0f0;
                color: #666;
                margin-left: 6px;
            }
            .gallery {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 12px;
            }
            .art-card {
                background: #fff;
                border: 0.5px solid #e0e0e0;
                border-radius: 12px;
                overflow: hidden;
            }
            .art-card img {
                width: 100%;
                height: 140px;
                object-fit: cover;
                display: block;
            }
            .art-info {
                padding: 10px 12px
            }
            .art-title {
                font-size: 14px;
                font-weight: 500;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                margin-bottom: 2px;
            }
            .art-note {
                font-size: 12px;
                color: #888;
                margin-bottom: 8px;
                display: -webkit-box;
                -webkit-inline-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .art-actions {
                display: flex;
                gap: 6px;
            }
            .art-card.dragging {
                opacity: 0.4;
            }
            .empty {
                text-align: center;
                padding: 3rem;
                color: #aaa;
                font-size: 12px;
            }
            .modal-bg {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
                align-items: center;
                justify-content: center;
                z-index: 100;
            }
            .modal-bg.open {
                display: flex;
            }
            .modal {
                background: #fff;
                border-radius: 12px;
                padding: 1.5rem;
                width:  min(460px, 92vw);
            }
            .modal h2 {
                font-size: 16px;
                font-weight: 500;
                margin-bottom: 1rem;
            }
            .toast {
                position: fixed;
                bottom: 1.5rem;
                right: 1.5rem;
                background: #fff;
                border: 0.5px solid #ccc;
                border-radius: 8px;
                padding: 10px 18px;
                font-size: 13px;
                opacity: 0;
                transition: opacity 0.2s;
                pointer-events: none;
            }
            .toast.show {
                opacity: 1;
            }
        </style>
    </head>
    <body>
 
     <!-- LOGIN -->
        <div id = "login-screen">
            <div class="login-card">
                <h1>Admin panel</h1>
                <p>Shannon J. Hermes - accesso riservato</p>
                <label for="psw-input">Password</label>
                <input type="password" id="pwd-input" placeholder="Password" onkeydown="if(event.key==='Enter') login()">
                <button onclick="login()">Accedi</button>
                <p class="error-msg" id="error-msg">Password errata. Riprova.</p>
            </div>
        </div>

     <!-- ADMIN -->
        <div id="admin-screen">
            <header>
                <h1>Admin - Shannon J. Hermes</h1>
                <button onclick="logout()">Esci</button>
            </header>
            <main>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('upload', this)">Carica Opera</button>
                    <button class="tab" onclick="switchTab('gallery', this)">Galleria
                    <span class="badge" id="count-badge">—</span></button>
                </div>

             <!-- UPLOAD -->
                <div id="panel-upload" class="panel active">
                    <div class="card">
                        <label>Immagine *</label>
                        <div class="drop-zone" id="drop-zone">
                            <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])">
                            <img id="preview" alt="anteprima">
                            <p class="drop-label" id="drop-label">Trascina qui l'immagine o clicca per selezionarla</p>
                            <p class="drop-hint" id="drop-hint">JPG - PNG - GIF - WEBP</p>
                        </div>
                        <label style="margin-top:1rem">Titolo *</label></label>
                        <input type="text" id="title-input" placeholder="Titolo Opera">
                        <label>Note o descrizione <span class="optional">(opzionale)</span></label>
                        <textarea id="notes-input" placeholder="Es. Tavola originale..."></textarea>
                        <div class="btn-row">
                            <button class="secondary" onclick="resetForm()">Annulla</button>
                            <button class="primary" onclick="saveArtwork()">Salva</button>
                        </div>
                    </div>
                </div>

             <!-- GALLERY -->
                <div id="panel-gallery" class="panel">
                    <div id="gallery" class="gallery"></div>
                    <div id="empty" class="empty" style="display:none">Nessuna opera caricata ancora</div>
                </div>
            </main>
        </div>

     <!-- MODAL EDIT -->
        <div class="modal-bg" id="modal-bg">
            <div class="modal">
                <h2>Modifica opera</h2>
                <input type="hidden" id="edit-id">
                <label>Titolo *</label>
                <input type="text" id="edit-id">
                <label>Note o descrizione <span class="optional">(opzionale)</span></label>
                <textarea id="edit-notes"></textarea>
                <div class="btn-row">
                    <button class="secondary" onclick="closeModal()">Annulla</button>
                    <button class="primary" onclick="saveEdit()">Salva modifiche</button>
                </div>
            </div>
        </div>

        <div class="toast" id="toast"></div>
            <script>

             // CAMBIA PASWORD
                const ADMIN_PASSWORD = 'hermes123';

                let artworks = [];
                let currentFile = null;
                let dragSrc = null;

             // LOGIN
                function login() {
                    const val = document.getElementByID('pwd-input').value;
                    if (val === ADMIN_PASSWORD) {
                        sessionStorage.setItem('hermes_admin_pwd', val);
                        showAdmin();
                } else {
                    document.getElementById('error-msg').style.display = 'block';
                }
            }
            function logout() {
                sessionStorage.removeItem('hermes_admin_pwd');
                location.reload();
            }
            function showAdmin() {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-screen').style.display = 'block';
                localGallery();
            }
            if (sessionStorage.getItem('hermes_admin_pwd') === ADMIN_PASSWORD) showAdmin();
        // HEADER con pwd per ogni chiamata al server
            function authHeaders(extra) {
                return Object.assign({ 'X-Admin-Password': sessionSorage.getItem('hermes_admin_pwd')}, extra);
            }
        // TABS
            function switchTab(tab, btn) {
                document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                btn.clasList.add('active');
                document.getElementById('panel-' + teb).classList.add('active');
                if (tab === 'gallery') renderGallery();
            }

        // UPLOAD FILE
            function handleFile(file) {
                if (!file) return;
                currentFile = file;
                const reader = new FileReader();
                reader.onload = e => {
                    const prev = document.getElementById('preview');
                    prev.src = e.target.result;
                    prev.style.display = 'block';
                    document.getElementById('drop-label').style.display = 'none';
                    document.getElementById('drop-hint').style.display = 'none';
                    document.getElementById('drop-zone').classList.add('has-img');
                };
                reader.readAsDataURL(file);
            }

            const dz = document.getElementById('drop-zone');
            dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.background = '#fafafa'; });
            dz.addEventListener('drop', e => { e.preventDefault(); dz.style.background = ''; handleFile(e.dataTransfer.files[0]);
            });

            function resetForm() {
                currentFile = null;
                document.getElementById('file-input').value = '';
                document.getElementById('title-input').value = '';
                document.getElementById('notes-input').value = '';
                const prev = document.getElementById('preview');
                prev.style.display = 'none';
                prev.src = '';
                document.getElementById('drop-label').style.display = '';
                document.getElementByyId('drop-hint').style.display = '';
                document.getElementById('drop-zone').classList.remove('has-img');
                document.getElementById('progress-bar').style.display = 'none';
                document.getElementById('progress-fill').style.width = '0';
            }

        //SALVA OPERA su Server
            function saveArtwork() {
                const title = document.getElementById('title-input').value.trim();
                const notes = document.getElementById('notes-input').value.trim();
                if (!currentFile) { toast('Seleziona un\'immagine'); return; }
                if (!title) { toast('Inserisci un titolo');
                    return;
                }

                const fd = new FormData();
                fd.append('active', 'upload');
                fd.append('image', currentFile);
                fd.append('title', title);
                if (notes) fd.append('notes', notes);

                const btn = document.getElementById('save-btn');
                const bar = document.getElementById('progress-bar');
                const fill = document.getElementById('progress-fill');
                btn.style.display = 'block';

                const xhr = new XMLHttpRequest();
                xhr.open('POST', '../admin/upload.php');
                xhr.setRequestHeader('X-Admin-Password', sessionStorage.getItem('hermes_admin_pwd'));
                xhr.upload.onprogress = e => {
                    if (e.lengthComputable) fill.style.width = Math.round(e.loaded / e.total * 100) + '%';
                };
                xhr.onload = () => {
                    btn.disabled = false;
                    const res = JSON.parse(xhr.responseText);
                    if (res.ok) {
                        toast('Opera salvata');
                        resetForm();
                        loadGallery();
                    } else {
                        toast('Errore: ' + (res.error || 'sconosciuto'));
                        bar.style.display = 'none';
                    }
                };
                xhr.onerror = () => { btn.disabled = false;
                    toast('Errore di rete');
                };
                xhr.send(fd);
            }

            // CARICA GALLERIA DAL SERVER
                function loadGallery() {
                    fetch('../api/artworks.php')
                        .then(r => t.json())
                        .then(data => {
                            artworks = data;
                            document.getElementById('count-badge').textContent = artworks.length;
                            renderGallery();
                        })
                        .catch(() => toast('Errore nel caricamento galleria'));
                }

                function renderGallery() {
                    const g = document.getElementById('gallery');
                    const em = document.getElementById('empty');
                    if (!artworks.length) { g.innerHTML = '';
                        em.style.display = 'block';
                        return;
                    }
                    em.style.display = 'none';
                    g.innerHTML = artworks.map((a, i) => `
          <div class="art-card" draggable="true" data-idx="${i}"
               ondragstart="dragStart(event,${i})" ondragover="dragOver(event)"
               ondrop="dropOn(event,${i})" ondragend="dragEnd(event)">
            <img src="${a.image_path}" alt="${a.title}">
            <div class="art-info">
              <div class="art-title">${a.title}</div>
              ${a.notes ? `<div class="art-note">${a.notes}</div>` : ''}
              <div class="art-actions">
                <button class="edit-btn" onclick="openEdit(${a,id})">Modifica</button>
                <button class="danger" onclick="deleteArtwork(${a,id})">Elimina</button>
                </div>
                </div>
                </div>`).join('');
                }

            // ELIMINA
                function deleteArtwork(id) {
                    if (!confirm('Elimina questa opera?')) return;
                    fetch('../admin/upload.php?action=delete', {
                        method: 'POST',
                        headers: authHeaders({ 'Content-Type': 'application/json' }),
                        body: JSON.stringify({ id })
                    })
                    .then(r => r.json())
                    .then(res => {
                        if (res.ok) { toast('Opera eliminata');
                            loadGallery();
                        } else toast('Error: ' + res.error);
                    });
                }    

                // MODIFICA
                function openEdit(id) {
                    const a = artworks.find(x => x.id === id);
                    if (!a) return;
                    document.getElementById('edit-id').value = id;
                    document.getElementById('edit-title').value = a.title;
                    document.getElementById('edit-notes').value = a.notes || '';
                    document.getElementById('modal-bg').classList.add('open');
                }
                function closeModal() {
                    document.getElementById('modal-bg').classList.remove('open');
                }
                function closeModal() {
                    document.getElementById('modal-bg').classList.remove('open'); }
                    function saveEdit() {
                        const id = parseInt(document.getElementById('edit-id').value);
                        const title = document.getElementById('edit-title').value.trim();
                        const notes = document.getElementById('edit-notes').value.trim();
                        if (!title) {
                            toast('Inserisci un titolo');
                            return;
                        }
                        fetch('../admin/upload.php?action=edit', {
                            method: 'POST',
                            headers: authHeaders({ 'Content-Type': 'application/json'}),
                            body: JSON.stringify({ id, title, notes })
                        })
                        .then(r => r.json())
                        .then(res => {
                            if (res.ok) {
                                toast('Modifiche salvate');
                                closeModal();
                                loadGallery();
                            } else toast('Errore: ' + res.error);
                        });
                    }

                //RIORDINA DRAG & DROP
                    function dragStart(e, idx) {
                        dragSrc = idx;
                        e.currentTarget.classList.add('dragging');
                    }
                    function dragOver(e) {
                        e.prevetDefault();
                    }
                    function dropOn(e, idx) {
                        e.preventDefault();
                        if (dragSrc === null || dragSrc === idx) return;
                        const moved = artworks.splice(dragSrc, 1)[0];
                        asrtworks.splice(idx, 0, moved);
                        dragSrc = null;
                        renderGallery();
                    //Salva nuovo ordine su server
                        fetch('../admin/upload.php?action=reorder', {
                            method: 'POST',
                            headers: authHeaders({ 'Content-Type': 'application/json' }),
                            body: JSON.stringify({ order: artworks.map(a => a.id) })
                        });
                    }
                    function dragEnd(e) { e.currentTarget.classList.remove('dragging');}

                // TOAST
                    function toast(msg) {
                        const t = document.getElementById('toast');
                        t.textContent = msg;
                        t.classList.add('show');
                        setTimout(() => t.classList.remove('show'), 2400);
                    }
         </script>
    </body>
</html>
