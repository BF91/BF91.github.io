<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="vewport" content="width==divace-width, initial-scale=1.0" />
        <title>Admin - Shannon J. Hermes</title>
        <meta name="robots" content="noindex, nofollow" />
        <style>
            *, *::before, *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: system-ui, sans-serif;
                background: #f5f5f3;
                color: #1a1a1a;
                min-height: 100vh;
            }

            /* LOGIN */
            #login-screen {
                display: flex;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 1rem;
            }
            .login-card {
                background: #fff;
                border: 0.5px solid #ddd;
                border-radius: 12px;
                padding: 2rem;
                width: min(360px, 100%);
            }
            .login-card h1 {
                font-size: 18px;
                font-weight: 500;
                margin-bottom: 4px;
            }
            .login-card p {
                font-size: 13px;
                color: #888;
                margin-bottom: 1.5rem;
            }
            .login-card label {
                font-size: 13px;
                color: #666;
                display: block;
                margin-bottom: 6px;
            }
            .login-card input {
                width: 100%;
                padding: 9px 12px;
                border: 0.5px solid #ccc;
                border-radius: 8px;
                font-size: 14px;
                margin-bottom: 1rem;
            }
            .login-card button {
                width: 100%;
                padding: 10px;
                border-radius: 8px;
                background: #1a1a1a;
                color: #fff;
                border: none;
                font-size: 14px;
                cursor: pointer;
            }
            .login-card button:hover {
                opacity: 0.85;
            }
            .error-msg {
                font-size: 13px;
                color: #a32d2d;
                margin-top: 8px;
                display: none;
            }

            /* ADMIN */
            #admin-screen {
                display: none;
            } 
            header {
                background: #fff;
                border-bottom: 0.5px solid #e0e0e0;
                padding: 1rem 2rem;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
            header h1 {
                font-size: 16px;
                font-weight: 500;
            }
            header button {
                padding: 6px 14px;
                border-radius: 8px;
                border: 0.5px solid #ccc;
                background: transparent;
                font-size: 13px;
                cursor: pointer;
            }
            header button:hover {
                background: #f0f0f0;
            }
            main {
                max-width: 900px;
                margin: 0 auto;
                padding: 2rem 1.5rem;
            }
            .tabs {
                display: flex;
                gap: 8px;
                margin-bottom: 1.5rem;
            }
            /* RIPRENDO DA TAB {} */
            .tab {
                padding: 8px 10px;
                border-radius: 8px;
                border: 0.5px solid #ccc;
                background: transparent;
                font-size: 14px;
                color: #666;
                cursor: pointer;
            }
            .tab.active {
                background: #f0f0f0;
                color: #1a1a1a;
                font-weight: 500;
                border-radius: 12px;
                color: #aaa;
            }
            .panel {
                display: none;
            }
            .panel.active {
                display: block;
            }
            .card {
                background: #fff;
                border: 0.5px solid #e0e0e0;
                border-radius: 12px;
                padding: 1.25rem;
            }
            label {
                font-size: 13px;
                color: #666;
                display: block;
                margin-bottom: 6px;
            }
            .optional {
                font-size: 11px;
                color: #aaa;
            }
            input[type=text], textarea { 
                width: 100%;
                padding: 8px 12px;
                border: 0.5px solid #ccc;
                border-radius: 8px;
                font-size: 14px;
                color: #1a1a1a;
                background: #fff;
                margin-bottom: 1rem;
            }
            textarea {
                resize: vertical;
                min-height: 80px;
            }
            .drop-zone {
                border: 1.5px dashed #ccc;
                border-radius: 12px;
                padding: 2rem;
                text-align: center;
                cursor: pointer;
                position: relative;
                margin-bottom: 1rem;
                transition: all 0.15s;
            }
            .drop-zone:hover {
                border-color: #999;
                background: #fafafa;
            }
            .drop-zone.has-img {
                border-style: solid;
                border-color: #378add;
            }
            .drop-zone input[type=file] {
                position: absolute;
                inset: 0;
                opacity: 0;
                cursor: pointer;
                width: 100%;
                height: 100%;
            }
            #preview {
                width: 100%;
                max-height: 220px;
                object-fit: contain;
                border-radius: 8px;
                display: none;
            }
            .drop-label {
                font-size: 14px;
                color: #888;
                pointer-events: none;
            }
            .drop-hint {
                font-size: 12px;
                color: #bbb;
                margin-top: 4px;
                pointer-events: none;
            }
            .btn-row {
                display: flex;
                gap: 8px;
                justify-content: flex-end;
                margin-top: 0.5rem;
            }
            .button.secondary {
                padding: 8px 18px;
                border-color: 8px;
                border: 0.5px solid #ccc;
                background: transparent;
                font-size: 14px;
                cursor: pointer;
            }
            button.secondary:hover {
                background: #f0f0f0;
            }
            button.primary {
                padding: 8px 18px;
                border-radius: 8px;
                border: none;
                background: #1a1a1a;
                color: #fff;
                font-size: 14px;
                cursor: pointer;
            }
            button.primary:hover {
                opacity: 0.85;
            }
            button.danger {
                padding: 5px 10px;
                border-radius: 8px;
                border: 0.5px solid #f09595;
                background: transparent;
                color: #a32d2d;
                font-size: 12px;
                cursor: pointer;
            }
            button.danger:hover {
                background: #fcebeb;
            }
            button.edit-btn {
                padding: 5px 10px;
                border-radius: 8px;
                border: 0.5px solid #ccc;
                background: transparent;
                font-size: 12px;
                cursor: pointer;
            }
            button.edit-btn:hover {
                background: #f0f0f0;
            }
            .badge {
                display: inline-block;
                font-size: 11px;
                padding: 2px 8px;
                border-radius: 8px;
                background: #f0f0f0;
                color: #666;
                margin-left: 6px;
            }
            .gallery {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 12px;
            }
            .art-card {
                background: #fff;
                border: 0.5px solid #e0e0e0;
                border-radius: 12px;
                overflow: hidden;
            }
            .art-card img {
                width: 100%;
                height: 140px;
                object-fit: cover;
                display: block;
            }
            .art-info {
                padding: 10px 12px
            }
            .art-title {
                font-size: 14px;
                font-weight: 500;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                margin-bottom: 2px;
            }
            .art-note {
                font-size: 12px;
                color: #888;
                margin-bottom: 8px;
                display: -webkit-box;
                -webkit-inline-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .art-actions {
                display: flex;
                gap: 6px;
            }
            .art-card.dragging {
                opacity: 0.4;
            }
            .empty {
                text-align: center;
                padding: 3rem;
                color: #aaa;
                font-size: 12px;
            }
            .modal-bg {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.45);
                align-items: center;
                justify-content: center;
                z-index: 100;
            }
            .modal-bg.open {
                display: flex;
            }
            .modal {
                background: #fff;
                border-radius: 12px;
                padding: 1.5rem;
                width:  min(460px, 92vw);
            }
            .modal h2 {
                font-size: 16px;
                font-weight: 500;
                margin-bottom: 1rem;
            }
            .toast {
                position: fixed;
                bottom: 1.5rem;
                right: 1.5rem;
                background: #fff;
                border: 0.5px solid #ccc;
                border-radius: 8px;
                padding: 10px 18px;
                font-size: 13px;
                opacity: 0;
                transition: opacity 0.2s;
                pointer-events: none;
            }
            .toast.show {
                opacity: 1;
            }
            @media (max-width: 500px) {
                header { padding: 1rem; }
                main { padding: 1rem; }
                .gallery { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));}
            }
        </style>
    </head>
    <body>
 
     <!-- LOGIN -->
        <div id=""login-screen">
            <div class="login-card">
                <h1>Admin panel</h1>
                <p>Shannon J. Hermes - accesso riservato</p>
                <label for="psw-input">Password</label>
                <input type="password" id="pwd-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
                <button onclick="login()">Accedi</button>
                <p class="error-msg" id="error-msg">Password errata. Riprova.</p>
            </div>
        </div>

     <!-- ADMIN -->
        <div id="admin-screen">
            <header>
                <h1>Admin - Shannon J. Hermes</h1>
                <button onclick="logout()">Esci</button>
            </header>
            <main>
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('upload', this)">Carica Opera</button>
                    <button class="tab" onclick="switchTab('gallery', this)">Galleria
                    <span class="badge" id="count-badge">0</span></button>
                </div>

             <!-- UPLOAD -->
                <div id="panel-upload" class="panel active">
                    <div class="card">
                        <label>Immagine</label>
                        <div class="drop-zone" id="drop-zone">
                            <input type="file" id="file-input" accept="image/*" onchange="handleFile(this.files[0])">
                            <img id="preview" alt="anteprima">
                            <p class="drop-label" id="drop-label">Trascina qui l'immagine o clicca per selezionarla</p>
                            <p class="drop-hint" id="drop-hint">JPG - PNG - GIF - WEBP</p>
                        </div>
                        <label>Titolo *</label>
                        <input type="text" id="title-input" placeholder="Titolo Opera">
                        <label>Note o descrizione <span class="optional">(opzionale)</span></label>
                        <textarea id="notes-input" placeholder="Es. Tavola originale..."></textarea>
                        <div class="btn-row">
                            <button class="secondary" onclick="resetForm()">Annulla</button>
                            <button class="primary" onclick="saveArtwork()">Salva</button>
                        </div>
                    </div>
                </div>
                
             <!-- GALLERY -->
                

            </main>
        </div>


    </body>
</html>
